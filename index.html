<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <h1>Частицы</h1>
    <div class="stats">
        Баллы: <span id="currentScore">0</span> | Лучший результат:
        <span id="bestScore">0</span>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn btn-start">Начать</button>
        <button id="pauseBtn" class="btn btn-pause">Пауза</button>
        <button id="resetBtn" class="btn btn-reset">Сбросить</button>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <script src="script.js"></script>
</body>

</html>
